<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chlorophyll-a Historical Explorer</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            padding: 2rem;
            display: flex;
            justify-content: center;
        }
        .explorer-panel {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
        }
        label {
            font-weight: bold;
            display: block;
            margin-top: 1rem;
        }
        input[type="number"] {
            width: 100%;
            padding: 0.5rem;
            margin-top: 0.5rem;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        #results {
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 2px solid #eee;
        }
        .highlight {
            font-size: 1.2rem;
            color: #0056b3;
            font-weight: bold;
        }.input-row {
            display: flex;
            gap: 10px;
            margin-top: 0.5rem;
        }
        .input-row input {
            width: 50%;
            margin-top: 0;
        }
    </style>
</head>
<body>

<div class="explorer-panel">
    <h2>Historical Conditions Filters</h2>
  
    <label>Month:</label>
    <div class="input-row">
        <input type="number" id="month-min" min="1" max="12" placeholder="Min (1)">
        <input type="number" id="month-max" min="1" max="12" placeholder="Max (12)">
    </div>  

    <label>Sea Surface Temp (°C):</label>
    <div class="input-row">
        <input type="number" id="sst-min" step="0.5" placeholder="Min (17)">
        <input type="number" id="sst-max" step="0.5" placeholder="Max (32)">
    </div>

    <label>Sea Level Anomaly (m):</label>
    <div class="input-row">
        <input type="number" id="sla-min" step="0.05" placeholder="Min (-0.3)">
        <input type="number" id="sla-max" step="0.05" placeholder="Max (0.5)">
    </div>

    <label>Oceanic Niño Index (ONI) [2 Month Lag]:</label>
    <div class="input-row">
        <input type="number" id="oni-min" step="0.1" placeholder="Min (-2)">
        <input type="number" id="oni-max" step="0.1" placeholder="Max (3)">
    </div>

    <label>Latitude (°N):</label>
    <div class="input-row">
        <input type="number" id="lat-min" step="0.5" placeholder="Min (18)">
        <input type="number" id="lat-max" step="0.5" placeholder="Max (24)">
    </div>

    <label>Longitude (°W):</label>
    <div class="input-row">
        <input type="number" id="lon-min" step="0.5" placeholder="Min (-110)">
        <input type="number" id="lon-max" step="0.5" placeholder="Max (-104)">
    </div>

    <div id="results">
        <p>Matching Data Points: <span id="count-result" class="highlight">--</span></p>
        <p>Average Chlorophyll-a: <span id="chl-result" class="highlight">Loading...</span> mg/m³</p>
    </div>
    <div id="table-container" style="margin-top: 2rem; border-top: 2px solid #eee; padding-top: 1rem;">
        <h3 style="margin-bottom: 1rem;">Top 20 Highest Chlorophyll Points</h3>
        <table style="width: 100%; border-collapse: collapse; font-size: 0.9rem;">
            <thead>
                <tr style="background-color: #f8f9fa; text-align: left;">
                    <th style="padding: 8px; border-bottom: 2px solid #ccc;">Month</th>
                    <th style="padding: 8px; border-bottom: 2px solid #ccc;">Lat</th>
                    <th style="padding: 8px; border-bottom: 2px solid #ccc;">Lon</th>
                    <th style="padding: 8px; border-bottom: 2px solid #ccc;">SST</th>
                    <th style="padding: 8px; border-bottom: 2px solid #ccc;">SLA</th>
                    <th style="padding: 8px; border-bottom: 2px solid #ccc;">ONI</th>
                    <th style="padding: 8px; border-bottom: 2px solid #ccc;">Chl-a</th>
                </tr>
            </thead>
            <tbody id="top-points-body">
                </tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="script.js"></script>

</body>
</html>
