<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chlorophyll-a Historical Explorer</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            padding: 2rem;
        }
        .dashboard-layout {
            display: flex;
            gap: 2rem;
            max-width: 1200px;
            margin: 0 auto;
            align-items: flex-start;
        }
        .explorer-panel {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            flex: 0 0 350px;
        }
        .data-panel {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            flex: 1;
            transition: opacity 0.3s ease;
        }
        .data-panel.is-loading {
            opacity: 0.4;
            pointer-events: none;
        }
        label { font-weight: bold; display: block; margin-top: 1rem; }
        input[type="number"] { width: 100%; padding: 0.5rem; margin-top: 0.5rem; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .input-row { display: flex; gap: 10px; margin-top: 0.5rem; }
        .input-row input { width: 50%; margin-top: 0; }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: #f8f9fa;
            padding: 1rem;
            border-radius: 6px;
            border-left: 4px solid #0056b3;
            text-align: center;
        }
        .stat-label { font-size: 0.85rem; color: #666; font-weight: bold; text-transform: uppercase; }
        .stat-value { font-size: 1.5rem; color: #0056b3; font-weight: bold; margin-top: 0.5rem; }
    </style>
</head>
<body>

<div class="dashboard-layout">
    <div class="explorer-panel">
        <h2>Filters</h2>
        <label>Month (1-12):</label>
        <div class="input-row">
            <input type="number" id="month-min" min="1" max="12" placeholder="Min">
            <input type="number" id="month-max" min="1" max="12" placeholder="Max">
        </div>

        <label>Sea Surface Temp (°C):</label>
        <div class="input-row">
            <input type="number" id="sst-min" step="0.5" placeholder="Min">
            <input type="number" id="sst-max" step="0.5" placeholder="Max">
        </div>

        <label>Sea Level Anomaly (m):</label>
        <div class="input-row">
            <input type="number" id="sla-min" step="0.05" placeholder="Min">
            <input type="number" id="sla-max" step="0.05" placeholder="Max">
        </div>

        <label>Oceanic Niño Index (ONI):</label>
        <div class="input-row">
            <input type="number" id="oni-min" step="0.1" placeholder="Min">
            <input type="number" id="oni-max" step="0.1" placeholder="Max">
        </div>

        <label>Latitude:</label>
        <div class="input-row">
            <input type="number" id="lat-min" step="0.5" placeholder="Min">
            <input type="number" id="lat-max" step="0.5" placeholder="Max">
        </div>

        <label>Longitude:</label>
        <div class="input-row">
            <input type="number" id="lon-min" step="0.5" placeholder="Min">
            <input type="number" id="lon-max" step="0.5" placeholder="Max">
        </div>
    </div>

    <div class="data-panel">
        <h2>Chl-a Distribution Metrics (mg/m³)</h2>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Average</div>
                <div class="stat-value" id="chl-result">--</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Median</div>
                <div class="stat-value" id="median-result">--</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Std Dev</div>
                <div class="stat-value" id="sd-result">--</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Variance</div>
                <div class="stat-value" id="var-result">--</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Total Points</div>
                <div class="stat-value" id="count-result" style="color: #333;">--</div>
            </div>
        </div>

        <div id="table-container">
            <h3>Top 20 Highest Chlorophyll Locations</h3>
            <div style="max-height: 350px; overflow-y: auto; border: 1px solid #eee; border-radius: 4px;">
                <table style="width: 100%; border-collapse: collapse; font-size: 0.9rem;">
                    <thead style="position: sticky; top: 0; z-index: 1; background-color: #f8f9fa;">
                        <tr style="text-align: left;">
                            <th style="padding: 8px; border-bottom: 2px solid #ccc;">Month</th>
                            <th style="padding: 8px; border-bottom: 2px solid #ccc;">Lat</th>
                            <th style="padding: 8px; border-bottom: 2px solid #ccc;">Lon</th>
                            <th style="padding: 8px; border-bottom: 2px solid #ccc;">SST</th>
                            <th style="padding: 8px; border-bottom: 2px solid #ccc;">SLA</th>
                            <th style="padding: 8px; border-bottom: 2px solid #ccc;">ONI</th>
                            <th style="padding: 8px; border-bottom: 2px solid #ccc;">Chl-a</th>
                        </tr>
                    </thead>
                    <tbody id="top-points-body">
                        </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="script.js"></script>

</body>
</html>
